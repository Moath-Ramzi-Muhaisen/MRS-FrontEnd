<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="author" content="Moath Ramzi Muhaisen" />
    <title>MRS - Login</title>

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap 5 -->
    <link href="style.css" rel="stylesheet" />

    <style>
      /* ── Design tokens (replaces Tailwind custom colors) ── */
      :root {
        --surface-container-low: #f3f3f4;
        --surface-container-lowest: #ffffff;
        --surface-container: #eeeeee;
        --surface-container-high: #e8e8e8;
        --surface-variant: #e2e2e2;
        --surface: #f9f9f9;
        --on-surface: #1a1c1c;
        --on-surface-variant: #414755;
        --on-background: #1a1c1c;
        --primary: #0058bc;
        --primary-container: #0070eb;
        --on-primary: #ffffff;
        --outline-variant: #c1c6d7;
        --outline: #717786;
        --secondary: #505f7a;
      }

      /* ── Base ── */
      body {
        background-color: var(--surface-container-low);
        font-family: "Inter", sans-serif;
        color: var(--on-background);
        min-height: 100vh;
      }

      /* ── Left pane (image) ── */
      .left-pane {
        position: relative;
        background-color: var(--surface-variant);
      }
      .left-pane img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .left-pane-overlay {
        position: absolute;
        inset: 0;
        background-color: rgba(0, 88, 188, 0.1);
        mix-blend-mode: multiply;
      }

      /* ── Right pane ── */
      .right-pane {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* ── Top bar ── */
      .top-bar {
        height: 64px;
        background: transparent;
      }
      .logo-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 8px;
        border-radius: 8px;
        transition:
          background 0.2s,
          opacity 0.2s;
        text-decoration: none;
      }
      .logo-wrap:hover {
        background-color: var(--surface-container-low);
      }
      .logo-wrap:active {
        opacity: 0.8;
      }
      .logo-wrap img {
        height: 32px;
        width: 32px;
        border-radius: 50%;
        object-fit: cover;
      }
      .logo-wrap h1 {
        font-family: "Manrope", sans-serif;
        font-size: 32px;
        line-height: 40px;
        letter-spacing: -0.02em;
        font-weight: 700;
        color: var(--primary);
        margin: 0;
      }

      /* ── Login card ── */
      .login-card {
        background-color: var(--surface-container-lowest);
        width: 100%;
        max-width: 440px;
        border-radius: 20px;
        box-shadow: 0px 10px 30px rgba(10, 27, 51, 0.05);
        padding: 32px;
      }

      .card-title {
        font-family: "Manrope", sans-serif;
        font-size: 24px;
        line-height: 32px;
        letter-spacing: -0.01em;
        font-weight: 600;
        color: var(--on-surface);
      }
      .card-subtitle {
        font-size: 16px;
        line-height: 24px;
        color: var(--on-surface-variant);
      }

      /* ── Labels ── */
      .field-label {
        font-family: "Inter", sans-serif;
        font-size: 12px;
        line-height: 16px;
        letter-spacing: 0.05em;
        font-weight: 600;
        color: var(--on-surface);
        text-transform: uppercase;
      }

      /* ── Inputs ── */
      .input-wrap {
        position: relative;
      }
      .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--on-surface-variant);
        font-size: 22px;
        pointer-events: none;
        z-index: 5;
        font-family: "Material Symbols Outlined";
        font-weight: 300;
      }
      .form-input {
        width: 100%;
        height: 56px;
        background-color: var(--surface-container-low);
        border: none;
        border-radius: 8px;
        padding-left: 48px;
        padding-right: 16px;
        font-family: "Inter", sans-serif;
        font-size: 16px;
        color: var(--on-surface);
        outline: none;
        transition:
          background 0.2s,
          box-shadow 0.2s;
      }
      .form-input:focus {
        background-color: var(--surface-container-lowest);
        box-shadow: 0 0 0 1px var(--primary);
      }
      .form-input.has-right-icon {
        padding-right: 48px;
      }
      .toggle-btn {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        padding: 0;
        color: var(--on-surface-variant);
        cursor: pointer;
        z-index: 5;
        transition: color 0.2s;
        display: flex;
        align-items: center;
      }
      .toggle-btn:hover {
        color: var(--primary);
      }
      .toggle-btn .material-symbols-outlined {
        font-size: 22px;
        font-weight: 300;
      }

      /* ── Forgot link ── */
      .forgot-link {
        font-size: 16px;
        color: var(--primary);
        text-decoration: none;
        transition: color 0.2s;
      }
      .forgot-link:hover {
        color: #004493;
      }

      /* ── Buttons ── */
      .btn-login {
        width: 100%;
        height: 56px;
        background: linear-gradient(
          to right,
          var(--primary),
          var(--primary-container)
        );
        color: var(--on-primary);
        border: none;
        border-radius: 8px;
        font-family: "Manrope", sans-serif;
        font-size: 20px;
        line-height: 28px;
        font-weight: 600;
        box-shadow: 0px 4px 10px rgba(0, 88, 188, 0.2);
        transition:
          opacity 0.2s,
          transform 0.1s;
        cursor: pointer;
      }
      .btn-login:hover {
        opacity: 0.9;
      }
      .btn-login:active {
        transform: scale(0.98);
      }

      .btn-register {
        width: 100%;
        height: 56px;
        background: transparent;
        color: var(--primary);
        border: 1px solid var(--outline-variant);
        border-radius: 8px;
        font-family: "Manrope", sans-serif;
        font-size: 20px;
        line-height: 28px;
        font-weight: 600;
        transition:
          background 0.2s,
          transform 0.1s;
        cursor: pointer;
      }
      .btn-register:hover {
        background-color: var(--surface-container-low);
      }
      .btn-register:active {
        transform: scale(0.98);
      }

      /* ── Footer ── */
      footer {
        background: transparent;
        margin-top: auto;
      }
      .footer-link {
        font-size: 16px;
        color: var(--on-surface-variant);
        text-decoration: none;
        transition: color 0.2s;
      }
      .footer-link:hover {
        color: var(--primary);
      }
      .footer-dot {
        color: var(--outline-variant);
        font-size: 0.875rem;
      }
    </style>
  </head>

  <body>
    <div class="d-flex" style="min-height: 100vh">
      <!-- Left Pane: Image -->
      <div class="left-pane d-none d-lg-block" style="width: 50%">
        <img
          src="Images/screen2.png"
          alt="Professional medical healthcare environment"
        />
        <div class="left-pane-overlay"></div>
      </div>

      <!-- Right Pane -->
      <div class="right-pane" style="width: 100%; flex: 1">
        <!-- Top Bar -->
        <header class="top-bar">
          <div
            class="d-flex align-items-center justify-content-between px-3 h-100 w-100"
            style="max-width: 1280px; margin: 0 auto"
          >
            <a href="#" class="logo-wrap">
              <img src="Images/screen.png" alt="Medical Business Logo" />
              <h1>MRS</h1>
            </a>
            <div><!-- navigation omitted for login --></div>
          </div>
        </header>

        <!-- Main -->
        <main
          class="flex-grow-1 d-flex align-items-center justify-content-center px-3 py-5"
        >
          <div class="login-card">
            <!-- Heading -->
            <div class="text-center mb-4">
              <h2 class="card-title mb-1">Welcome back</h2>
              <p class="card-subtitle mb-0">Log in to your account</p>
            </div>

            <!-- Form -->
            <form class="d-flex flex-column gap-4">
              <!-- Email -->
              <div class="d-flex flex-column gap-1">
                <label class="field-label" for="email">Email Address</label>
                <div class="input-wrap">
                  <span class="material-symbols-outlined input-icon">mail</span>
                  <input
                    class="form-input"
                    id="email"
                    type="text"
                    placeholder="Enter your email"
                  />
                </div>
              </div>

              <!-- Password -->
              <div class="d-flex flex-column gap-1">
                <label class="field-label" for="password">Password</label>
                <div class="input-wrap">
                  <span class="material-symbols-outlined input-icon">lock</span>
                  <input
                    class="form-input has-right-icon"
                    id="password"
                    type="password"
                    placeholder="Enter your password"
                  />
                  <button class="toggle-btn" type="button" id="togglePassword">
                    <span class="material-symbols-outlined">visibility</span>
                  </button>
                </div>
                <div class="d-flex justify-content-end mt-1">
                  <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
              </div>

              <!-- Actions -->
              <div class="d-flex flex-column gap-3 mt-1">
                <button class="btn-login" type="button" onclick="Login()">
                  Login
                </button>
                <button class="btn-register" type="button">Register</button>
              </div>
            </form>
          </div>
        </main>

        <!-- Footer -->
        <footer class="py-3">
          <div
            class="d-flex justify-content-center align-items-center gap-3 flex-wrap"
          >
            <a href="#" class="footer-link">Terms of Service</a>
            <span class="footer-dot">•</span>
            <a href="#" class="footer-link">Privacy Policy</a>
            <span class="footer-dot">•</span>
            <a href="#" class="footer-link">Help Center</a>
          </div>
        </footer>
      </div>
      <!-- /right-pane -->
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Toggle password visibility -->
    <script>
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");
      const toggleIcon = togglePassword.querySelector(
        ".material-symbols-outlined",
      );

      togglePassword.addEventListener("click", () => {
        const isHidden = passwordInput.type === "password";
        passwordInput.type = isHidden ? "text" : "password";
        toggleIcon.textContent = isHidden ? "visibility_off" : "visibility";
      });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="mrs.js"></script>
  </body>
</html>
